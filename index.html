const libraryKeys = Object.keys(library).sort((a, b) => b.length - a.length);
const frameKeys = Object.keys(exerciseFrames).sort((a, b) => b.length - a.length);

function findInLibrary(name) {
  const n = name.toLowerCase();
  let lib = null;
  for (const k of libraryKeys) { if (n.includes(k)) { lib = library[k]; break; } }
  let frames = null;
  for (const k of frameKeys) { if (n.includes(k)) { frames = exerciseFrames[k]; break; } }
  if (!lib && !frames) return null;
  return { ...(lib || {}), frames };
}

function watchVideo(query) {
  const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(query + ' execução técnica')}`;
  window.open(url, '_blank', 'noopener,noreferrer');
}

// ============== APP ==============
function App() {
  const [view, setView] = useState({ screen: 'home' });
  const [counts, setCounts] = useState(storage.get());

  const incrementWorkout = (id) => {
    const next = { ...counts, [id]: (counts[id] || 0) + 1 };
    setCounts(next);
    storage.set(next);
  };

  const decrementWorkout = (id) => {
    const current = counts[id] || 0;
    if (current === 0) return;
    const next = { ...counts, [id]: current - 1 };
    if (next[id] === 0) delete next[id];
    setCounts(next);
    storage.set(next);
  };

  const totalSessions = Object.values(counts).reduce((a, b) => a + b, 0);
  const progressPct = Math.min(100, Math.round((totalSessions / YEAR_TARGET) * 100));

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-purple-50 to-pink-50">
      <header className="bg-gradient-to-r from-purple-600 via-pink-500 to-orange-400 text-white px-5 pt-6 pb-8 shadow-lg" style={{paddingTop:'max(1.5rem, env(safe-area-inset-top))'}}>
        <div className="max-w-2xl mx-auto">
          <div className="flex items-center gap-3 mb-2">
            <div className="bg-white/20 backdrop-blur p-2 rounded-xl"><Dumbbell className="w-6 h-6"/></div>
            <div>
              <h1 className="text-2xl font-black tracking-tight">Plano 12 Meses</h1>
              <p className="text-white/90 text-sm font-medium">Pedal forte • Trilha sem dor</p>
            </div>
          </div>
          <div className="mt-5 bg-white/15 backdrop-blur rounded-2xl p-4 border border-white/20">
            <div className="flex items-center justify-between mb-2">
              <span className="text-sm font-semibold flex items-center gap-1.5"><Trophy className="w-4 h-4"/> Progresso anual</span>
              <span className="text-sm font-bold">{totalSessions}/{YEAR_TARGET}</span>
            </div>
            <div className="h-2.5 bg-white/25 rounded-full overflow-hidden">
              <div className="h-full bg-gradient-to-r from-yellow-300 to-green-300 rounded-full transition-all duration-700" style={{width: `${progressPct}%`}}/>
            </div>
            <p className="text-xs mt-2 text-white/90">{progressPct}% • meta: 2 sessões × 52 semanas</p>
          </div>
        </div>
      </header>
      <main className="max-w-2xl mx-auto px-4 py-6 pb-20">
        {view.screen === 'home' && <HomeView setView={setView} counts={counts}/>}
        {view.screen === 'phase' && <PhaseView phaseId={view.phaseId} setView={setView} counts={counts}/>}
        {view.screen === 'workout' && <WorkoutView phaseId={view.phaseId} workoutId={view.workoutId} setView={setView} counts={counts} incrementWorkout={incrementWorkout} decrementWorkout={decrementWorkout}/>}
        {view.screen === 'principles' && <PrinciplesView setView={setView}/>}
      </main>
    </div>
  );
}

function HomeView({ setView, counts }) {
  return (
    <div className="space-y-5">
      <button onClick={() => setView({ screen: 'principles' })} className="w-full bg-white border-2 border-purple-200 rounded-2xl p-4 flex items-center gap-3 hover:border-purple-400 hover:shadow-md transition-all text-left">
        <div className="bg-gradient-to-br from-purple-500 to-pink-500 p-2.5 rounded-xl text-white"><Info className="w-5 h-5"/></div>
        <div className="flex-1">
          <p className="font-bold text-slate-800">Princípios joelho-friendly</p>
          <p className="text-sm text-slate-500">Leia antes de começar</p>
        </div>
        <ChevronLeft className="w-5 h-5 text-slate-400 rotate-180"/>
      </button>
      <div>
        <h2 className="text-lg font-black text-slate-800 mb-1 px-1">As 4 Fases</h2>
        <p className="text-sm text-slate-500 mb-4 px-1">Toque numa fase para ver os treinos</p>
        <div className="space-y-3">
          {phases.map(p => {
            const phaseSessions = p.workouts.reduce((acc, w) => acc + (counts[w.id] || 0), 0);
            return (
              <button key={p.id} onClick={() => setView({ screen: 'phase', phaseId: p.id })} className={`w-full bg-gradient-to-br ${p.gradient} text-white rounded-2xl p-5 shadow-md hover:shadow-xl active:scale-[0.99] transition-all text-left`}>
                <div className="flex items-start justify-between mb-3">
                  <div className="text-4xl">{p.emoji}</div>
                  <span className="bg-white/25 backdrop-blur text-xs font-bold px-2.5 py-1 rounded-full">{phaseSessions} {phaseSessions === 1 ? 'sessão' : 'sessões'}</span>
                </div>
                <p className="text-xs font-bold uppercase tracking-wider opacity-90">{p.name}</p>
                <h3 className="text-2xl font-black mt-0.5">{p.title}</h3>
                <p className="text-sm opacity-95 mt-1">{p.subtitle}</p>
                <div className="flex flex-wrap gap-1.5 mt-3">
                  {p.focus.map(f => <span key={f} className="text-xs bg-white/20 backdrop-blur px-2 py-0.5 rounded-full font-medium">{f}</span>)}
                </div>
              </button>
            );
          })}
        </div>
      </div>
      <div className="bg-white rounded-2xl p-4 border border-slate-200">
        <p className="text-xs text-slate-500 leading-relaxed"><strong className="text-slate-700">Frequência:</strong> 2 sessões/semana = ~104 sessões no ano. Combine com seus pedais. Reserve 1 dia totalmente off por semana.</p>
      </div>
    </div>
  );
}

function PrinciplesView({ setView }) {
  const items = [
    { icon: Target, title: 'Dor é sinal de parada', text: 'Desconforto leve durante esforço é OK. Dor aguda ou no joelho = pare e ajuste carga ou amplitude.' },
    { icon: Activity, title: 'Profundidade controlada', text: 'No agachamento, vá só até onde for confortável. Geralmente acima de 90° nos primeiros meses.' },
    { icon: Zap, title: 'Glúteo é prioridade', text: 'Glúteo forte = joelho protegido. Hip thrust, ponte e abdução são seus melhores amigos.' },
    { icon: Heart, title: 'Aquecimento sempre', text: '5 min de bike + ativação glútea antes de qualquer treino pesado. Não pule.' },
    { icon: Sparkles, title: 'Unilateral para estabilidade', text: 'Single-leg RDL, búlgaro controlado e step-ups treinam o controle que você precisa em terreno irregular.' },
    { icon: Bike, title: 'Evite mesa extensora pesada', text: 'O exercício mais agressivo para condromalácia. Prefira agachamento parcial e leg press com ROM curto.' },
    { icon: Mountain, title: 'Excêntrico controlado', text: 'Descer devagar (3 segundos) constrói resistência para descidas de trilha.' },
    { icon: Scale, title: 'Carga via RIR', text: 'RIR = Reps in Reserve. Ajuste a carga para que sobrem X reps que você poderia fazer mas não faz.' },
  ];
  return (
    <div className="space-y-4">
      <button onClick={() => setView({ screen: 'home' })} className="flex items-center gap-1 text-purple-600 font-semibold text-sm hover:gap-2 transition-all"><ChevronLeft className="w-4 h-4"/> Voltar</button>
      <div className="bg-gradient-to-br from-purple-500 to-pink-500 text-white rounded-2xl p-5">
        <h2 className="text-2xl font-black">Princípios joelho-friendly</h2>
        <p className="text-sm text-white/90 mt-1">Leia uma vez. Aplique sempre.</p>
      </div>
      <div className="space-y-3">
        {items.map((it, i) => {
          const I = it.icon;
          return (
            <div key={i} className="bg-white rounded-2xl p-4 border border-slate-200 flex gap-3">
              <div className="bg-gradient-to-br from-purple-100 to-pink-100 p-2.5 rounded-xl h-fit"><I className="w-5 h-5 text-purple-600"/></div>
              <div>
                <p className="font-bold text-slate-800">{it.title}</p>
                <p className="text-sm text-slate-600 mt-0.5 leading-relaxed">{it.text}</p>
              </div>
            </div>
          );
        })}
      </div>
      <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4">
        <p className="text-xs text-amber-800 leading-relaxed"><strong>Importante:</strong> mesmo com alta da fisio, mostre este plano para um profissional que conheça seu histórico antes de começar.</p>
      </div>
    </div>
  );
}

function PhaseView({ phaseId, setView, counts }) {
  const phase = phases.find(p => p.id === phaseId);
  if (!phase) return null;
  const phaseSessions = phase.workouts.reduce((acc, w) => acc + (counts[w.id] || 0), 0);
  return (
    <div className="space-y-5">
      <button onClick={() => setView({ screen: 'home' })} className="flex items-center gap-1 text-purple-600 font-semibold text-sm hover:gap-2 transition-all"><ChevronLeft className="w-4 h-4"/> Todas as fases</button>
      <div className={`bg-gradient-to-br ${phase.gradient} text-white rounded-2xl p-6 shadow-lg`}>
        <div className="flex items-start justify-between mb-2">
          <div className="text-5xl">{phase.emoji}</div>
          <span className="bg-white/25 backdrop-blur text-xs font-bold px-3 py-1 rounded-full">{phaseSessions} {phaseSessions === 1 ? 'sessão' : 'sessões'}</span>
        </div>
        <p className="text-xs font-bold uppercase tracking-wider opacity-90 mt-2">{phase.name}</p>
        <h2 className="text-3xl font-black">{phase.title}</h2>
        <p className="text-sm opacity-95 mt-1">{phase.subtitle}</p>
        <p className="text-sm bg-white/15 backdrop-blur rounded-xl p-3 mt-4 leading-relaxed">{phase.description}</p>
        <div className="text-xs bg-white/20 backdrop-blur rounded-xl p-3 mt-2 leading-relaxed flex gap-2">
          <Scale className="w-4 h-4 flex-shrink-0 mt-0.5"/>
          <span><strong>Carga:</strong> {phase.rir}</span>
        </div>
      </div>
      <div>
        <h3 className="text-lg font-black text-slate-800 mb-3 px-1">Treinos desta fase</h3>
        <div className="space-y-3">
          {phase.workouts.map(w => {
            const wCount = counts[w.id] || 0;
            return (
              <button key={w.id} onClick={() => setView({ screen: 'workout', phaseId: phase.id, workoutId: w.id })} className="w-full bg-white border-2 border-slate-200 hover:border-slate-300 rounded-2xl p-4 flex items-center gap-4 hover:shadow-md active:scale-[0.99] transition-all text-left">
                <div className={`text-4xl ${wCount > 0 ? '' : 'opacity-60'}`}>{w.emoji}</div>
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <span className={`text-xs font-black uppercase tracking-wider ${phase.accent}`}>{w.title}</span>
                    {wCount > 0 && <span className={`text-xs font-bold ${phase.chip} px-2 py-0.5 rounded-full`}>feito {wCount}×</span>}
                  </div>
                  <p className="font-bold text-slate-800">{w.subtitle}</p>
                  <div className="flex items-center gap-1.5 text-xs text-slate-500 mt-1"><Clock className="w-3.5 h-3.5"/><span>{w.duration} min</span></div>
                </div>
                <ChevronLeft className="w-5 h-5 text-slate-400 rotate-180"/>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function WorkoutView({ phaseId, workoutId, setView, counts, incrementWorkout, decrementWorkout }) {
  const phase = phases.find(p => p.id === phaseId);
  const workout = phase?.workouts.find(w => w.id === workoutId);
  const [expanded, setExpanded] = useState({});
  if (!workout) return null;
  const wCount = counts[workout.id] || 0;
  const toggleEx = (id) => setExpanded(p => ({ ...p, [id]: !p[id] }));

  return (
    <div className="space-y-5">
      <button onClick={() => setView({ screen: 'phase', phaseId })} className="flex items-center gap-1 text-purple-600 font-semibold text-sm hover:gap-2 transition-all"><ChevronLeft className="w-4 h-4"/> Voltar para {phase.title}</button>
      <div className={`bg-gradient-to-br ${phase.gradient} text-white rounded-2xl p-6 shadow-lg`}>
        <div className="flex items-start justify-between">
          <div>
            <p className="text-xs font-bold uppercase tracking-wider opacity-90">{phase.name} • {workout.title}</p>
            <h2 className="text-3xl font-black mt-1">{workout.subtitle}</h2>
            <div className="flex items-center gap-1.5 mt-2 text-sm"><Clock className="w-4 h-4"/><span>{workout.duration} min total</span></div>
            <div className="flex items-center gap-1.5 mt-1 text-xs opacity-95"><Scale className="w-3.5 h-3.5"/><span>{phase.rir}</span></div>
          </div>
          <div className="text-6xl">{workout.emoji}</div>
        </div>
      </div>
      <div className="bg-purple-50 border border-purple-200 rounded-xl p-3 text-xs text-purple-900 flex gap-2">
        <Info className="w-4 h-4 flex-shrink-0 mt-0.5"/>
        <span>Toque em qualquer exercício para ver o desenho do movimento, carga e mais detalhes.</span>
      </div>
      <div className="space-y-4">
        {workout.sections.map((sec, si) => {
          const style = sectionStyle[sec.type];
          const I = style.icon;
          return (
            <div key={si} className="bg-white rounded-2xl border-2 border-slate-100 overflow-hidden">
              <div className={`px-4 py-3 border-b ${style.color} flex items-center gap-2 font-bold`}>
                <I className="w-4 h-4"/>
                <span className="flex-1 text-sm uppercase tracking-wider">{sec.title}</span>
                <span className="text-xs font-semibold opacity-80">{sec.duration} min</span>
              </div>
              <div className="divide-y divide-slate-100">
                {sec.exercises.map((ex, ei) => {
                  const exId = `${si}-${ei}`;
                  return <ExerciseCard key={exId} ex={ex} index={ei + 1} isExpanded={!!expanded[exId]} onToggle={() => toggleEx(exId)} phase={phase}/>;
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Counter card */}
      <div className={`rounded-2xl p-4 bg-gradient-to-br ${phase.gradient} text-white shadow-lg`}>
        <div className="flex items-center justify-between mb-3">
          <div>
            <p className="text-xs font-bold uppercase tracking-wider opacity-90">Sessões deste treino</p>
            <p className="text-3xl font-black">{wCount}</p>
          </div>
          <Trophy className="w-10 h-10 opacity-50"/>
        </div>
        <div className="flex gap-2">
          <button onClick={() => decrementWorkout(workout.id)} disabled={wCount === 0} className="bg-white/20 hover:bg-white/30 disabled:opacity-30 disabled:cursor-not-allowed backdrop-blur rounded-xl px-4 py-3 font-bold flex items-center justify-center gap-2 transition-all active:scale-[0.97]" aria-label="Remover uma sessão">
            <Minus className="w-5 h-5"/>
          </button>
          <button onClick={() => incrementWorkout(workout.id)} className="flex-1 bg-white text-slate-800 rounded-xl px-4 py-3 font-bold flex items-center justify-center gap-2 shadow-md hover:shadow-xl active:scale-[0.99] transition-all">
            <Plus className="w-5 h-5"/> Marcar treino concluído
          </button>
        </div>
        {wCount > 0 && <p className="text-xs text-white/90 mt-2.5 text-center">Toque "+" toda vez que terminar este treino</p>}
      </div>
    </div>
  );
}

function ExerciseCard({ ex, index, isExpanded, onToggle, phase }) {
  const lib = findInLibrary(ex.name);
  const ytQuery = lib?.yt || ex.name;
  return (
    <div className="p-4">
      <button onClick={onToggle} className="w-full text-left">
        <div className="flex items-start gap-3">
          <div className={`flex-shrink-0 w-7 h-7 rounded-full ${phase.chip} flex items-center justify-center text-xs font-black`}>{index}</div>
          <div className="flex-1 min-w-0">
            <div className="flex items-start justify-between gap-2">
              <p className="font-bold text-slate-800 leading-snug">{ex.name}</p>
              <ChevronDown className={`w-5 h-5 text-slate-400 flex-shrink-0 transition-transform ${isExpanded ? 'rotate-180' : ''}`}/>
            </div>
            <div className="flex flex-wrap gap-1.5 mt-1.5">
              <span className="text-xs bg-slate-100 text-slate-700 px-2 py-0.5 rounded-md font-semibold">{ex.sets}× {ex.reps}</span>
              {ex.rest && <span className="text-xs bg-slate-100 text-slate-700 px-2 py-0.5 rounded-md font-semibold">descanso {ex.rest}</span>}
            </div>
            {ex.note && !isExpanded && <p className="text-xs text-slate-500 mt-2 italic leading-relaxed">💡 {ex.note}</p>}
          </div>
        </div>
      </button>
      {isExpanded && (
        <div className="mt-4 pl-10 space-y-3 fade-in">
          {lib?.frames && lib.frames.length > 0 && (
            <div>
              <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">📋 Movimento</p>
              <div className="flex gap-2 items-stretch">
                {lib.frames.map((f, i) => {
                  const isStart = i === 0;
                  const label = lib.frames.length === 1 ? 'Posição' : (isStart ? 'Início' : 'Fim');
                  return (
                    <div key={i} className={`flex-1 rounded-xl p-2 border-2 relative ${isStart ? 'bg-gradient-to-br from-emerald-50 to-teal-50 border-emerald-200' : 'bg-gradient-to-br from-rose-50 to-pink-50 border-rose-200'}`}>
                      <div className={`text-[10px] font-black uppercase tracking-wider text-center mb-1 ${isStart ? 'text-emerald-700' : 'text-rose-700'}`}>{label}</div>
                      <div className="w-full" dangerouslySetInnerHTML={{__html: f}}/>
                    </div>
                  );
                })}
              </div>
              {lib.frames.length > 1 && <p className="text-[11px] text-slate-500 text-center mt-1.5 italic">verde → rosa: sentido do movimento</p>}
            </div>
          )}
          <button onClick={(e) => { e.stopPropagation(); watchVideo(ytQuery); }} className="w-full bg-gradient-to-r from-red-500 to-pink-500 text-white rounded-xl px-4 py-3 font-bold text-sm flex items-center justify-center gap-2 shadow-md hover:shadow-lg active:scale-[0.99] transition-all">
            <Play className="w-4 h-4"/> Ver demonstração no YouTube
          </button>
          {ex.note && <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3 text-xs text-yellow-900 leading-relaxed">💡 {ex.note}</div>}
          {lib && (lib.muscles || lib.equip) && (
            <div className="grid grid-cols-1 gap-2 text-xs">
              {lib.muscles && <div className="bg-slate-50 rounded-lg px-3 py-2"><span className="font-bold text-slate-500 uppercase tracking-wider text-[10px]">💪 Músculos</span><p className="text-slate-700 mt-0.5">{lib.muscles}</p></div>}
              {lib.equip && <div className="bg-slate-50 rounded-lg px-3 py-2"><span className="font-bold text-slate-500 uppercase tracking-wider text-[10px]">🏋️ Equipamento</span><p className="text-slate-700 mt-0.5">{lib.equip}</p></div>}
            </div>
          )}
          {lib?.load && (
            <div className="bg-blue-50 border border-blue-200 rounded-xl p-3">
              <p className="text-xs font-bold text-blue-900 uppercase tracking-wider flex items-center gap-1"><Scale className="w-3.5 h-3.5"/> Carga sugerida</p>
              <p className="text-sm text-blue-900 mt-1.5"><strong>Inicial:</strong> {lib.load.start}</p>
              <p className="text-xs text-blue-800 mt-1 leading-relaxed"><strong>Progressão:</strong> {lib.load.up}</p>
            </div>
          )}
          {lib?.mistakes && lib.mistakes.length > 0 && (
            <div>
              <p className="text-xs font-bold text-rose-700 uppercase tracking-wider mb-1.5">⚠️ Erros comuns</p>
              <ul className="space-y-1 text-sm text-slate-700">
                {lib.mistakes.map((m, i) => <li key={i} className="flex gap-2"><AlertTriangle className="w-4 h-4 text-rose-500 flex-shrink-0 mt-0.5"/><span className="leading-relaxed">{m}</span></li>)}
              </ul>
            </div>
          )}
          {lib?.knee && (
            <div className="bg-purple-50 border border-purple-200 rounded-xl p-3">
              <p className="text-xs font-bold text-purple-900 uppercase tracking-wider mb-1">🦵 Nota joelho-friendly</p>
              <p className="text-sm text-purple-900 leading-relaxed">{lib.knee}</p>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
